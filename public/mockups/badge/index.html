<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge preview — ConcreteBC 2027</title>
    <link rel="stylesheet" href="../mockups.css" />
  </head>
  <body>
    <div class="container">
      <header class="mock-header">
        <span class="mock-logo">ConcreteBC</span>
        <h1>Conference badge</h1>
        <p class="subtitle">Preview your attendee badge</p>
      </header>

      <div class="badge-preview">
        <p class="badge-event">ConcreteBC 2027 Member Conference</p>
        <p class="badge-name">Demo Attendee</p>
        <p class="badge-org">Sample Org Ltd.</p>
        <span class="badge-role">Member · Speaker track</span>
        <div class="qr-placeholder" aria-label="QR code placeholder"></div>
        <p style="font-size: 0.7rem; color: var(--muted); margin-top: 0.75rem">
          Scan for session check-in (demo)
        </p>
      </div>

      <div class="btn-group" style="justify-content: center; margin-top: 2rem">
        <a href="generate.html" class="btn">Generate / download</a>
        <a href="../registration/index.html" class="btn btn-secondary"
          >Back to registration</a
        >
      </div>

      <footer class="mock-footer">
        Static mockup — fake data only · ConcreteBC Events Demo
      </footer>
    </div>
  </body>
</html>
